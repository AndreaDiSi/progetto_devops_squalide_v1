{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto p-6">

  <a href="javascript:history.back()" class="text-sm text-indigo-600 hover:underline">← Torna al folder</a>
  <h1 class="text-2xl font-bold text-gray-800 mt-2 mb-6">Modifica: {{ doc.filename }}</h1>

  <form method="post" class="bg-white rounded-lg shadow p-6">
    <textarea name="content" rows="20"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y">{{ doc.content }}</textarea>
    <div class="mt-4 flex justify-end gap-3">
      <a href="javascript:history.back()"
         class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-md hover:bg-gray-50">
        Annulla
      </a>
      <button type="submit"
              class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
        Salva modifiche
      </button>
    </div>
  </form>

</div>
{% endblock %}

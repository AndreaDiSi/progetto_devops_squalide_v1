{% extends "base.html" %}
{% block title %}Carica documento – Squalide{% endblock %}

{% block content %}
<div class="max-w-lg">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Carica documento</h2>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <form hx-post="/upload" hx-target="#msg" hx-swap="outerHTML" hx-encoding="multipart/form-data" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">File di testo (.txt)</label>
        <input type="file" name="file" accept=".txt" required
          class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0
                 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition">
        Carica
      </button>
    </form>
    <p id="msg" class="mt-3 text-sm"></p>
  </div>
</div>
{% endblock %}

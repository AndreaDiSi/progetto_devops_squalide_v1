{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto p-6">

  <a href="/groups/{{ group_id }}/folder" class="text-sm text-indigo-600 hover:underline">← Torna al folder</a>
  <h1 class="text-2xl font-bold text-gray-800 mt-2 mb-6">{{ doc.filename }}</h1>

  <div class="bg-white rounded-lg shadow p-6">
    <pre class="text-sm text-gray-700 whitespace-pre-wrap break-all font-mono leading-relaxed overflow-auto max-h-[70vh]">{{ doc.content }}</pre>
  </div>

</div>
{% endblock %}
